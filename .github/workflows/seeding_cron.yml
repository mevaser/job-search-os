name: CareerFlow Seeding Engine

on:
  schedule:
    # Run twice a day, e.g., 00:00 and 12:00
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  run-seeding-engine:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit the database back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 bs4 requests google-generativeai python-dotenv firebase-admin

      - name: Run Layer 1 (Email Ingestion)
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m backend.seeding.layer1_email

      # Future: Run Layer 2 (RSS) here
      
      - name: Run Layer 3 (Verifier)
        run: python -m backend.seeding.layer3_verifier

      - name: Force Seed Test Target
        run: python -m backend.force_seed

      - name: Run Layer 4 (Sniper Engine)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: python -m backend.layer4_sniper

      - name: Commit and Push Database State
        run: |
          # Configure Git user for the commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the SQLite database file (force add to bypass .gitignore)
          git add -f careerflow.db
          
          # Check if the database was modified
          if git diff --staged --quiet; then
            echo "No changes to the database to commit."
            exit 0
          fi
          
          # Commit the changes with [skip ci] to prevent infinite loops
          git commit -m "chore(db): persist Seeding Engine state [skip ci]"
          
          # Rebase to handle conflicts if a human pushed code while the action ran
          git pull --rebase origin main
          
          # Push the changes back to the repository
          git push origin main
